[env:ST7789]
platform = espressif32@6.9.0
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.partitions = default.csv

build_flags =
    -Iinclude
    -DLV_CONF_INCLUDE_SIMPLE
    -DCYD_ST7789=1

lib_deps =
    lovyan03/LovyanGFX @ ^1.1.12
    lvgl/lvgl @ ^8.3.9
